<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI Thai Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            page: "#FAFAF9",
            primary: "#4338CA",
            secondary: "#D97706",
            tertiary: "#0F766E",
            lightBlue: "#E0E7FF",
            textDark: "#1C1917",
            textMuted: "#78716C",
            threadLine: "#E7E5E4"
          },
          fontFamily: {
            sans: ["Sarabun", "system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "sans-serif"],
            display: ["Noto Serif Thai", "Crimson Text", "Georgia", "serif"]
          },
          boxShadow: {
            soft: "0 24px 70px rgba(67, 56, 202, 0.10)"
          }
        }
      }
    };
  </script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Noto+Serif+Thai:wght@600;700&family=Sarabun:wght@400;500;600;700&display=swap");

    body {
      background:
        radial-gradient(circle at top left, rgba(217, 119, 6, 0.10), transparent 30rem),
        linear-gradient(180deg, #FAFAF9 0%, #F5F5F4 100%);
    }

    .fade-in {
      animation: fadeIn 180ms ease-out;
    }

    .smooth-view {
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .smooth-view.is-leaving {
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
    }

    .thread-panel {
      position: relative;
    }

    .thread-panel::before {
      content: "";
      position: absolute;
      left: 1.25rem;
      top: 1.5rem;
      bottom: 1.5rem;
      width: 2px;
      background: #E7E5E4;
    }

    .thread-dot {
      box-shadow: 0 0 0 6px #FAFAF9;
    }

    @media (min-width: 640px) {
      .thread-panel::before {
        left: 1.75rem;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="min-h-screen bg-page text-textDark antialiased">
  <main class="min-h-[100svh] px-3 py-2 sm:px-6 sm:py-4 lg:px-8">
    <div class="mx-auto flex min-h-[calc(100svh-1rem)] w-full max-w-4xl items-center justify-center sm:min-h-[calc(100svh-2rem)]">
      <div id="app" class="w-full" aria-live="polite"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
